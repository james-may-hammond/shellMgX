name: Release

on:
  push:
    tags:
      - "v*.*.*" # Triggers only when a version tag like `v1.0.0` is pushed

permissions:
  contents: write 

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: shellMgX-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: shellMgX-mac
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: shellMgX-windows.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/shell target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: Rename-Item -Path "target\${{ matrix.target }}\release\shell.exe" -NewName "${{ matrix.artifact_name }}"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          generate_release_notes: true

